version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    exclude-functions:
      - (*os.File).Close
      - (io.ReadCloser).Close
      - (io.WriteCloser).Close

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [errcheck]
